<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Login | Jwigato</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{

            background:#080808;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            overflow:hidden;

        }

        body::before{

            content:"";
            position:absolute;
            width:600px;
            height:600px;
            background:#ff00c830;
            filter:blur(170px);
            top:-180px;
            right:-150px;

        }

        body::after{

            content:"";
            position:absolute;
            width:500px;
            height:500px;
            background:#8b5cf630;
            filter:blur(170px);
            bottom:-180px;
            left:-120px;

        }

        .login-card{

            width:430px;
            background:rgba(18,18,18,.85);
            backdrop-filter:blur(25px);
            border:1px solid rgba(255,255,255,.08);
            border-radius:30px;
            padding:40px;
            box-shadow:0 0 40px rgba(255,0,200,.25);
            z-index:10;

        }

        .logo{

            text-align:center;
            font-size:45px;
            margin-bottom:10px;

        }

        h2{

            text-align:center;
            font-weight:700;
            color:white;

        }

        .subtitle{

            text-align:center;
            color:#9e9e9e;
            margin-bottom:35px;

        }

        .form-label{

            color:#ddd;

        }

        .form-control{

            background:#1b1b1b;
            border:1px solid #333;
            color:white;
            height:52px;
            border-radius:15px;

        }

        .form-control:focus{

            background:#1b1b1b;
            color:white;
            border-color:#ff00c8;
            box-shadow:0 0 15px rgba(255,0,200,.45);

        }

        .input-group-text{

            background:#1b1b1b;
            border:1px solid #333;
            border-left:none;
            color:#ff00c8;
            cursor:pointer;

        }

        .btn-login{

            height:54px;
            border:none;
            border-radius:15px;
            background:#ff00c8;
            font-weight:600;
            font-size:17px;
            color:white;
            transition:.3s;
            box-shadow:0 0 20px rgba(255,0,200,.45);

        }

        .btn-login:hover{

            background:#ff22cf;
            transform:translateY(-3px);
            box-shadow:0 0 35px rgba(255,0,200,.7);

        }

        #message{

            margin-top:20px;

        }

        hr{

            border-color:#333;

        }

        .bottom{

            text-align:center;
            color:#999;

        }

        .bottom a{

            color:#ff00c8;
            text-decoration:none;

        }

        .bottom a:hover{

            text-decoration:underline;

        }

        .back-btn{

            margin-top:20px;
            display:block;
            text-align:center;
            text-decoration:none;
            color:#bbb;
            transition:.3s;

        }

        .back-btn:hover{

            color:#ff00c8;

        }

    </style>

</head>

<body>

<div class="login-card">

    <div class="logo">

        🍜

    </div>

    <h2>

        Welcome Back

    </h2>

    <p class="subtitle">

        Sign in to <strong style="color:#ff00c8;">Jwigato</strong>

    </p>

    <form id="loginForm">

        <div class="mb-3">

            <label class="form-label">

                Email Address

            </label>

            <input
                    type="email"
                    id="email"
                    class="form-control"
                    placeholder="Enter your email"
                    required>

        </div>

        <div class="mb-4">

            <label class="form-label">

                Password

            </label>

            <div class="input-group">

                <input
                        type="password"
                        id="password"
                        class="form-control"
                        placeholder="Enter your password"
                        required>

                <span class="input-group-text">

<i
        id="togglePassword"
        class="bi bi-eye">
</i>

</span>

            </div>

        </div>

        <button
                id="loginBtn"
                type="submit"
                class="btn btn-login w-100">

            Login

        </button>

    </form>

    <div id="message"></div>

    <hr>

    <div class="bottom">

        Don't have an account?

        <a href="/register">

            Create One

        </a>

    </div>

    <a href="/" class="back-btn">

        ← Back to Home

    </a>

</div>

<script src="/js/login.js"></script>

</body>

</html>
